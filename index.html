<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isak Graarud | Online CV</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- Navigation -->
  <header class="header">
    <a href="#about" class="nav-initials">IG</a>
    <nav class="nav">
      <div class="nav-spacer"></div>
      <ul class="nav-tabs">
        <li><a href="#about" class="nav-tab active" data-tab="about">About Me</a></li>
        <li><a href="#github" class="nav-tab" data-tab="github">Github</a></li>
        <li><a href="#education" class="nav-tab" data-tab="education">Education</a></li>
      </ul>
      <div class="nav-spacer"></div>
    </nav>
  </header>

  <main class="main">
    <!-- About Me Section -->
    <section id="about" class="page-section active" data-section="about">
      <div class="section-content animate-on-scroll">
      <h1 class="section-title">Hi, I am Isak 👋</h1>
        <div class="card about-card">
          <div class="about-content">
            <img src="images/photo.png" alt="Isak Graarud" class="about-photo" />
            <p id="bio-intro" class="about-intro"> Loading bio...</p>
            <p id="bio-story"></p>
          </div>
          <div class="social-links">
            <a href="https://github.com/Isakgraarud" class="btn btn-primary" target="_blank" rel="noopener">
              View my Github
            </a>
            <a href="https://www.linkedin.com/in/isak-graarud" class="btn btn-secondary">LinkedIn</a>
            <a href="mailto:isak.graarud@gmail.com" class="btn btn-secondary">Email</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Github Section -->
    <section id="github" class="page-section" data-section="github">
      <div class="section-content animate-on-scroll">
        <h1 class="section-title">Github</h1>
        <div class="card github-card">
          <p>Explore my projects, contributions, and open-source work on GitHub.</p>
          <a href="https://github.com/Isakgraarud" class="btn btn-primary btn-large" target="_blank" rel="noopener">
            Visit my GitHub Profile →
          </a>
        </div>
      </div>
    </section>

    <!-- Education Section -->
    <section id="education" class="page-section" data-section="education">
      <div class="section-content animate-on-scroll">
        <h1 class="section-title">Education</h1>
        <div class="card">
          <ul class="degree-list animate-on-scroll stagger-children" id="degree-list"></ul>
          <a href="#" class="btn btn-primary" download>Download CV (PDF)</a>
        </div>
      </div>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
